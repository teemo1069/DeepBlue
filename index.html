<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深藍數量雲端管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deepest: #020917;
    --bg-dark: #050f1e;
    --bg-card: #0a1929;
    --bg-row: #0d2137;
    --bg-row-alt: #091b2e;
    --accent-blue: #1565c0;
    --accent-bright: #2196f3;
    --accent-cyan: #00b4d8;
    --accent-gold: #ffd54f;
    --text-primary: #e8f4fd;
    --text-secondary: #90caf9;
    --text-muted: #4a7fa8;
    --border: #1a3a5c;
    --border-bright: #2196f3;
    --success: #4caf50;
    --danger: #ef5350;
    --shadow-blue: 0 0 30px rgba(33,150,243,0.15);
    --shadow-glow: 0 0 60px rgba(33,150,243,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg-deepest);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(33,150,243,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(33,150,243,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 32px;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(33,150,243,0.1);
    border: 1px solid rgba(33,150,243,0.3);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-cyan);
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 900;
    background: linear-gradient(135deg, #e8f4fd 0%, #90caf9 50%, #42a5f5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr; }
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Controls */
  .admin-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }

  .btn-primary { background: var(--accent-blue); border-color: var(--accent-bright); color: white; }
  .btn-success { background: rgba(76,175,80,0.15); border-color: rgba(76,175,80,0.4); color: #a5d6a7; }
  .btn-danger { background: rgba(239,83,80,0.15); border-color: rgba(239,83,80,0.4); color: #ef9a9a; }

  /* Table */
  .table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .table-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: rgba(21,101,192,0.08);
  }

  table { width: 100%; border-collapse: collapse; }
  th { padding: 12px 20px; text-align: left; font-size: 11px; color: var(--text-muted); border-bottom: 1px solid var(--border); }
  td { padding: 12px 20px; font-size: 14px; border-bottom: 1px solid rgba(26,58,92,0.5); }

  .qty-input {
    background: rgba(33,150,243,0.12);
    border: 1px solid var(--accent-blue);
    border-radius: 6px;
    color: var(--accent-bright);
    width: 80px;
    padding: 4px 10px;
    text-align: right;
  }

  /* Modals */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,9,23,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px;
    width: 90%;
    max-width: 400px;
  }

  .modal-input {
    width: 100%;
    background: rgba(33,150,243,0.08);
    border: 1px solid var(--border);
    padding: 12px;
    color: white;
    margin-bottom: 15px;
    border-radius: 8px;
  }

  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0d2137;
    border: 1px solid var(--success);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    opacity: 0;
    transition: 0.3s;
    z-index: 1000;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-badge">DEEP BLUE CLOUD SYSTEM</div>
    <h1>深藍數量雲端管理系統</h1>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">項目總數</div><div class="stat-value" id="stat-total">0</div></div>
    <div class="stat-card"><div class="stat-label">平均數量</div><div class="stat-value" id="stat-avg">0</div></div>
    <div class="stat-card"><div class="stat-label">最高數量</div><div class="stat-value" style="color:var(--accent-gold)" id="stat-top">—</div></div>
  </div>

  <div class="admin-bar">
    <div id="mode-text">正在連接伺服器...</div>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" id="admin-btn" style="display:none" onclick="openModal('login-modal')">🔐 管理員登入</button>
      <button class="btn btn-success" id="add-btn" style="display:none" onclick="openModal('add-modal')">➕ 新增項目</button>
      <button class="btn btn-danger" id="logout-btn" style="display:none" onclick="logout()">登出</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header-bar">
      <span>ITEM LIST</span>
      <input type="text" id="search-input" placeholder="搜尋..." style="background:rgba(0,0,0,0.2); border:1px solid var(--border); color:white; padding:5px 10px; border-radius:5px;" oninput="renderTable(this.value)">
    </div>
    <div id="table-container"></div>
  </div>
</div>

<div class="modal-overlay" id="login-modal" style="display:none">
  <div class="modal">
    <h2>管理員登入</h2>
    <p style="color:var(--text-muted); font-size:12px; margin-bottom:15px;">請輸入密碼以啟用編輯與新增功能</p>
    <input type="password" id="login-pw" class="modal-input" placeholder="請輸入密碼">
    <div style="display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn" onclick="closeModal('login-modal')">取消</button>
      <button class="btn btn-primary" onclick="login()">登入</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal" style="display:none">
  <div class="modal">
    <h2>新增項目</h2>
    <input type="text" id="new-name" class="modal-input" placeholder="項目名稱">
    <input type="number" id="new-qty" class="modal-input" placeholder="初始數量">
    <input type="text" id="new-note" class="modal-input" placeholder="備註 (選填)">
    <div style="display:flex; justify-content:flex-end; gap:10px;">
      <button class="btn" onclick="closeModal('add-modal')">取消</button>
      <button class="btn btn-success" onclick="addItem()">確認新增</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

// 【修正 1】增加 typeof 檢查，避免在沒有注入全域變數的環境中觸發 ReferenceError 導致系統崩潰
const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

let app, auth, db;
try {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
} catch (e) {
  console.warn("Firebase 初始化參數缺失或異常，請確認是在支援的平台上運行。");
}

let items = [];
let isEditMode = false;
let currentUser = null;
let unsubscribeSnapshot = null;

// --- 登入邏輯 ---
window.login = function() {
  const pw = document.getElementById('login-pw').value;
  
  if (pw === "admin123") { 
    isEditMode = true;
    closeModal('login-modal');
    document.getElementById('admin-btn').style.display = 'none';
    document.getElementById('add-btn').style.display = 'inline-block';
    document.getElementById('logout-btn').style.display = 'inline-block';
    document.getElementById('mode-text').textContent = '✏️ 編輯模式';
    showToast("登入成功！已開啟編輯權限");
    renderTable();
  } else {
    showToast("密碼錯誤！");
  }
};

window.logout = function() {
  isEditMode = false;
  document.getElementById('admin-btn').style.display = 'inline-block';
  document.getElementById('add-btn').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('mode-text').textContent = '唯讀模式';
  renderTable();
};

// --- Firebase 初始化邏輯 ---
async function startApp() {
  if (!auth) return;
  try {
    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
      await signInWithCustomToken(auth, __initial_auth_token);
    } else {
      await signInAnonymously(auth);
    }
    
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('admin-btn').style.display = 'inline-block';
        document.getElementById('mode-text').textContent = '唯讀模式';
        listenToData();
      }
    });
  } catch (err) {
    console.error("Auth failed:", err);
    showToast("連線伺服器失敗，請重新整理。");
  }
}

function listenToData() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  
  // 【修正 2】Firebase Document 參照層級必須是「偶數」(Collection -> Doc -> Collection -> Doc)。
  // 原本的 public/data/main 是 5 層（不合規），修改為 public/main （4 層）。
  const docRef = doc(db, 'artifacts', appId, 'public', 'main');
  
  unsubscribeSnapshot = onSnapshot(docRef, (snap) => {
    if (snap.exists()) {
      items = snap.data().items || [];
    } else {
      items = [{id: 1, name: "測試項目", qty: 0, note: "歡迎使用系統"}];
      saveData();
    }
    renderTable();
  }, (err) => {
    console.error("Firestore error:", err);
    if (err.code === 'permission-denied') {
      showToast("權限錯誤：請確保路徑正確。");
    }
  });
}

async function saveData() {
  if (!currentUser) return;
  // 【同步修正】寫入路徑必須與讀取路徑維持一致
  const docRef = doc(db, 'artifacts', appId, 'public', 'main');
  try {
    await setDoc(docRef, { items });
  } catch (error) {
    console.error("Save error:", error);
    showToast("儲存失敗，請檢查權限。");
  }
}

window.addItem = function() {
  const name = document.getElementById('new-name').value;
  const qty = parseInt(document.getElementById('new-qty').value) || 0;
  const note = document.getElementById('new-note').value;
  if (!name) return showToast("請輸入名稱");
  
  items.push({ id: Date.now(), name, qty, note });
  saveData();
  closeModal('add-modal');
  
  // 清空輸入框
  document.getElementById('new-name').value = '';
  document.getElementById('new-qty').value = '';
  document.getElementById('new-note').value = '';
  
  showToast("新增成功");
};

window.updateQty = function(id, val) {
  const item = items.find(i => i.id === id);
  if (item) {
    item.qty = parseInt(val) || 0;
    saveData();
    updateStats();
  }
};

window.renderTable = function(search) {
  // 【修正 3】當 login/logout 沒有傳遞 search 參數時，主動抓取搜尋框的現存文字，避免畫面跟搜尋列不同步。
  if (typeof search !== 'string') {
    search = document.getElementById('search-input').value || "";
  }
  
  const container = document.getElementById('table-container');
  let filtered = items.filter(i => i.name.toLowerCase().includes(search.toLowerCase()));
  
  filtered.sort((a, b) => b.qty - a.qty);

  let html = `<table><thead><tr><th>名稱</th><th>數量</th><th>備註</th></tr></thead><tbody>`;
  filtered.forEach(item => {
    const qtyField = isEditMode 
      ? `<input type="number" class="qty-input" value="${item.qty}" onchange="updateQty(${item.id}, this.value)">`
      : `<span style="color:var(--accent-bright); font-weight:bold;">${item.qty}</span>`;
      
    html += `<tr>
      <td>${item.name}</td>
      <td>${qtyField}</td>
      <td style="color:var(--text-muted); font-size:12px;">${item.note || '—'}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  container.innerHTML = html;
  updateStats();
};

function updateStats() {
  const total = items.length;
  const avg = total ? (items.reduce((a, b) => a + b.qty, 0) / total).toFixed(1) : 0;
  const sorted = [...items].sort((a, b) => b.qty - a.qty);
  const top = items.length ? sorted[0].name : "—";
  
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-avg').textContent = avg;
  document.getElementById('stat-top').textContent = top;
}

// UI 控制
window.openModal = (id) => document.getElementById(id).style.display = 'flex';
window.closeModal = (id) => document.getElementById(id).style.display = 'none';
function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 啟動程式
startApp();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深藍數量雲端管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deepest: #020917;
    --bg-dark: #050f1e;
    --bg-card: #0a1929;
    --bg-row: #0d2137;
    --bg-row-alt: #091b2e;
    --accent-blue: #1565c0;
    --accent-bright: #2196f3;
    --accent-cyan: #00b4d8;
    --accent-gold: #ffd54f;
    --text-primary: #e8f4fd;
    --text-secondary: #90caf9;
    --text-muted: #4a7fa8;
    --border: #1a3a5c;
    --border-bright: #2196f3;
    --success: #4caf50;
    --danger: #ef5350;
    --shadow-blue: 0 0 30px rgba(33,150,243,0.15);
    --shadow-glow: 0 0 60px rgba(33,150,243,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg-deepest);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(33,150,243,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(33,150,243,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(21,101,192,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,180,216,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 0 32px;
    position: relative;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(33,150,243,0.1);
    border: 1px solid rgba(33,150,243,0.3);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-cyan);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .header-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent-cyan);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .header h1 {
    font-size: clamp(24px, 5vw, 42px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.1;
    background: linear-gradient(135deg, #e8f4fd 0%, #90caf9 50%, #42a5f5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr; gap: 10px; }
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s;
  }

  .stat-card:hover {
    border-color: rgba(33,150,243,0.4);
    transform: translateY(-2px);
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-bright), transparent);
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
  }

  .stat-value.highlight {
    font-size: 18px;
    color: var(--accent-gold);
    font-weight: 700;
  }

  .stat-icon {
    position: absolute;
    top: 16px; right: 16px;
    font-size: 20px;
    opacity: 0.3;
  }

  /* Admin bar */
  .admin-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 20px;
    padding: 14px 18px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .mode-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .mode-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  .mode-dot.readonly { background: var(--text-muted); }
  .mode-dot.edit { background: var(--success); animation: pulse 1.5s infinite; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid;
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.96); }

  .btn-primary {
    background: var(--accent-blue);
    border-color: var(--accent-bright);
    color: white;
  }

  .btn-primary:hover {
    background: var(--accent-bright);
    box-shadow: 0 0 20px rgba(33,150,243,0.4);
  }

  .btn-danger {
    background: rgba(239,83,80,0.15);
    border-color: rgba(239,83,80,0.4);
    color: #ef9a9a;
  }

  .btn-danger:hover {
    background: rgba(239,83,80,0.25);
    box-shadow: 0 0 20px rgba(239,83,80,0.2);
  }

  /* Table */
  .table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-blue);
  }

  .table-header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(21,101,192,0.08);
  }

  .table-title {
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  .search-box {
    background: rgba(33,150,243,0.08);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: 'Noto Sans TC', sans-serif;
    width: 180px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-box:focus {
    border-color: var(--accent-bright);
    box-shadow: 0 0 12px rgba(33,150,243,0.2);
  }

  .search-box::placeholder { color: var(--text-muted); }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    padding: 12px 20px;
    text-align: left;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    background: rgba(5,15,30,0.6);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }

  thead th.num { text-align: right; }

  tbody tr {
    border-bottom: 1px solid rgba(26,58,92,0.5);
    transition: background 0.15s;
    animation: rowFadeIn 0.3s ease both;
  }

  @keyframes rowFadeIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  tbody tr:hover { background: rgba(33,150,243,0.06); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 12px 20px;
    font-size: 14px;
    color: var(--text-primary);
    vertical-align: middle;
  }

  .rank-cell {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    width: 44px;
    text-align: right;
    padding-right: 8px;
  }

  .rank-1 { color: var(--accent-gold); font-weight: 700; }
  .rank-2 { color: #b0bec5; }
  .rank-3 { color: #cd7f32; }

  .name-cell { font-weight: 500; }

  .qty-cell {
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent-bright);
    white-space: nowrap;
  }

  .qty-bar-cell {
    width: 160px;
    padding-right: 20px;
  }

  .qty-bar-wrap {
    background: rgba(33,150,243,0.1);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
  }

  .qty-bar {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
    transition: width 0.5s ease;
  }

  .qty-input {
    background: rgba(33,150,243,0.12);
    border: 1px solid var(--accent-blue);
    border-radius: 6px;
    color: var(--accent-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    width: 80px;
    padding: 4px 10px;
    text-align: right;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .qty-input:focus {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 10px rgba(0,180,216,0.3);
  }

  /* Note cell */
  .note-cell {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    max-width: 200px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(2,9,23,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--bg-card);
    border: 1px solid rgba(33,150,243,0.3);
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 80px rgba(33,150,243,0.2);
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text-primary);
  }

  .modal p {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .modal-input {
    width: 100%;
    background: rgba(33,150,243,0.08);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text-primary);
    font-size: 15px;
    font-family: 'JetBrains Mono', monospace;
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 0.1em;
  }

  .modal-input:focus {
    border-color: var(--accent-bright);
    box-shadow: 0 0 16px rgba(33,150,243,0.25);
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-cancel {
    background: transparent;
    border-color: var(--border);
    color: var(--text-muted);
  }

  .btn-cancel:hover { border-color: var(--text-muted); color: var(--text-primary); }

  .error-msg {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
    display: none;
  }

  .error-msg.show { display: block; }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 20px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(33,150,243,0.15);
    border-top-color: var(--accent-bright);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    animation: blink 1.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Status toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid rgba(76,175,80,0.4);
    color: #a5d6a7;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    z-index: 200;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  .firebase-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    padding: 6px 12px;
    background: rgba(33,150,243,0.06);
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .firebase-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
  }

  .firebase-dot.connected { background: var(--success); animation: pulse 2s infinite; }

  @media (max-width: 640px) {
    .qty-bar-cell, .note-cell { display: none; }
    .search-box { width: 130px; }
    .stat-value { font-size: 22px; }
  }

  .note-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(33,150,243,0.12);
    border: 1px solid rgba(33,150,243,0.2);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  .top-badge {
    display: inline-block;
    width: 18px; height: 18px;
    line-height: 18px;
    text-align: center;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    margin-right: 4px;
    vertical-align: middle;
  }

  .top-1 { background: rgba(255,213,79,0.2); color: var(--accent-gold); border: 1px solid rgba(255,213,79,0.4); }
  .top-2 { background: rgba(176,190,197,0.15); color: #b0bec5; border: 1px solid rgba(176,190,197,0.3); }
  .top-3 { background: rgba(205,127,50,0.15); color: #cd9b6e; border: 1px solid rgba(205,127,50,0.3); }

  .sync-indicator {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent-cyan);
    animation: fadeIn 0.3s ease;
    padding: 4px 10px;
    background: rgba(0,180,216,0.08);
    border-radius: 6px;
    border: 1px solid rgba(0,180,216,0.2);
  }
</style>
</head>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-badge">
      <span>DEEP BLUE SYSTEM</span>
      <span id="firebase-status-badge" class="firebase-status">
        <span class="firebase-dot" id="firebase-dot"></span>
        <span id="firebase-status-text">連線中...</span>
      </span>
    </div>
    <h1>深藍數量雲端管理系統</h1>

  <!-- Stats -->
  <div class="stats-grid">

      <div class="stat-icon">📦</div>

    <div class="stat-card">
      <div class="stat-icon">🏆</div>
      <div class="stat-label">目前數量最高</div>
      <div class="stat-value highlight" id="stat-top">—</div>
    </div>
  </div>

  <!-- Admin bar -->
  <div class="admin-bar">
    <div class="mode-indicator">
      <span class="mode-dot" id="mode-dot"></span>
      <span id="mode-text">唯讀模式</span>

    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">

      <button class="btn btn-danger" id="logout-btn" onclick="doLogout()" style="display:none;">登出編輯模式</button>

  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header-bar">
      <span class="table-title">ITEMS — SORTED BY QUANTITY DESC</span>
      <input class="search-box" type="text" placeholder="🔍 搜尋項目..." id="search-input" oninput="renderTable()">
    </div>
    <div id="table-container">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">連線至資料庫...</div>
      </div>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="login-modal" style="display:none;">
  <div class="modal">
    <h2>🔐 管理員登入</h2>
    <p>請輸入管理員密碼以進入編輯模式</p>
    <input class="modal-input" type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="error-msg" id="pw-error">⚠ 密碼錯誤，請重試</div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeLogin()">取消</button>
      <button class="btn btn-primary" onclick="doLogin()">確認登入</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

// ============================================================
// App state
// ============================================================
let items = [];
let isEditMode = false;
let unsubscribe = null;
let maxQty = 0;
let firebaseReady = false;
let user = null;

// ============================================================
// Authentication & Initialization
// ============================================================
async function initAuth() {
  try {
    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
      await signInWithCustomToken(auth, __initial_auth_token);
    } else {
      await signInAnonymously(auth);
    }
  } catch (err) {
    console.error("Auth error:", err);
    fallbackLocalData();
  }
}

onAuthStateChanged(auth, (u) => {
  user = u;
  if (user) {
    loadFromFirebase();
  }
});

// Start auth immediately
initAuth();

function setFirebaseStatus(connected) {
  firebaseReady = connected;
  const dot = document.getElementById('firebase-dot');
  const txt = document.getElementById('firebase-status-text');
  if (connected) {
    dot.className = 'firebase-dot connected';
    txt.textContent = 'Firebase 已連線';
  } else {
    dot.className = 'firebase-dot';
    txt.textContent = '本地模式';
  }
}

function fallbackLocalData() {
  setFirebaseStatus(false);
  items = INITIAL_ITEMS.map((x, i) => ({ ...x, id: i }));
  renderAll();
}

async function loadFromFirebase() {
  if (!user) return;
  const docRef = doc(db, "artifacts", appId, "public", "data", "deepBlueItems", "main");

  unsubscribe = onSnapshot(docRef, (snap) => {
    setFirebaseStatus(true);
    if (snap.exists()) {
      items = snap.data().items || [];
    } else {
      // First run — write initial data
      items = INITIAL_ITEMS.map((x, i) => ({ ...x, id: i }));
      writeToFirebase(items);
    }
    renderAll();
  }, (err) => {
    console.error("Firestore error:", err);
    fallbackLocalData();
  });
}

async function writeToFirebase(dataToSave) {
  if (!user || !firebaseReady) return;
  try {
    const docRef = doc(db, "artifacts", appId, "public", "data", "deepBlueItems", "main");
    await setDoc(docRef, { items: dataToSave, updatedAt: new Date().toISOString() }, { merge: true });
    showSyncBadge();
  } catch (err) {
    console.error("Write failed:", err);
    showToast("⚠ 同步失敗，請檢查權限");
  }
}

// ============================================================
// Render
// ============================================================
window.renderTable = function() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = items.filter(x => !q || x.name.toLowerCase().includes(q));
  
  // Requirement: Sort highest quantity at the top
  filtered.sort((a, b) => b.qty - a.qty);

  if (!filtered.length) {
    document.getElementById('table-container').innerHTML = `
      <div class="loading-state">
        <div style="font-size:32px;margin-bottom:12px;">🔍</div>
        <div class="loading-text">找不到符合的項目</div>
      </div>`;
    return;
  }

  const rows = filtered.map((item, idx) => {
    const rank = idx + 1;
    const pct = maxQty > 0 ? Math.round((item.qty / maxQty) * 100) : 0;
    let rankBadge = `<span style="color:var(--text-muted);font-family:JetBrains Mono,monospace;font-size:12px;">${rank}</span>`;
    if (rank === 1) rankBadge = `<span class="top-badge top-1">1</span>`;
    if (rank === 2) rankBadge = `<span class="top-badge top-2">2</span>`;
    if (rank === 3) rankBadge = `<span class="top-badge top-3">3</span>`;

    const noteHtml = item.note ? `<span class="note-tag" title="${item.note}">${item.note}</span>` : `<span style="color:var(--border)">—</span>`;
    
    const qtyHtml = isEditMode
      ? `<input class="qty-input" type="number" min="0" value="${item.qty}" 
           onchange="updateQty(${item.id}, this.value)" 
           oninput="updateQty(${item.id}, this.value)">`
      : `<span style="color:var(--accent-bright);font-family:JetBrains Mono,monospace;font-size:15px;font-weight:600;">${item.qty}</span>`;

    return `<tr>
      <td class="rank-cell">${rankBadge}</td>
      <td class="name-cell">${item.name}</td>
      <td class="qty-cell">${qtyHtml}</td>
      <td class="qty-bar-cell">
        <div class="qty-bar-wrap"><div class="qty-bar" style="width:${pct}%"></div></div>
      </td>
      <td class="note-cell">${noteHtml}</td>
    </tr>`;
  }).join('');

  document.getElementById('table-container').innerHTML = `
    <table>
      <thead>
        <tr>
          <th style="width:44px;">#</th>
          <th>項目名稱</th>
          <th class="num">使用數量</th>
          <th class="qty-bar-cell"></th>
          <th class="note-cell">備註</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderAll() {
  updateStats();
  window.renderTable();
}

function updateStats() {
  if (!items.length) return;
  const sorted = [...items].sort((a, b) => b.qty - a.qty);
  maxQty = sorted[0]?.qty || 1;

  const total = items.length;
  const avg = (items.reduce((s, x) => s + x.qty, 0) / total).toFixed(1);
  const topItem = sorted[0]?.name || "—";

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-avg').textContent = avg;
  document.getElementById('stat-top').textContent = topItem;
}

// ============================================================
// Data mutation
// ============================================================
window.updateQty = function(id, val) {
  if (!isEditMode) return;
  const n = parseInt(val, 10);
  if (isNaN(n) || n < 0) return;
  const item = items.find(x => x.id === id);
  if (item) {
    item.qty = n;
    
    // Immediate local UI update for sorting & stats
    updateStats();
    
    // Debounce firebase write
    clearTimeout(window._writeTimer);
    window._writeTimer = setTimeout(() => writeToFirebase(items), 800);
  }
};

// ============================================================
// Auth & UI actions
// ============================================================
window.showLogin = function() {
  if (isEditMode) return;
  document.getElementById('login-modal').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').classList.remove('show');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
};

window.closeLogin = function() {
  document.getElementById('login-modal').style.display = 'none';
};

window.doLogin = async function() {
  const pw = document.getElementById('pw-input').value;
  if (!pw) return;
  
  // 為了方便演示，將密碼設定為簡單字串 admin123
  if (pw === "admin123") {
    isEditMode = true;
    document.getElementById('login-modal').style.display = 'none';
    document.getElementById('mode-dot').className = 'mode-dot edit';
    document.getElementById('mode-text').textContent = '✏ 編輯模式';
    document.getElementById('admin-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'inline-flex';
    window.renderTable();
    showToast("✓ 已進入編輯模式");
  } else {
    document.getElementById('pw-error').classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
};

window.doLogout = function() {
  isEditMode = false;
  document.getElementById('mode-dot').className = 'mode-dot readonly';
  document.getElementById('mode-text').textContent = '唯讀模式';
  document.getElementById('admin-btn').style.display = 'inline-flex';
  document.getElementById('logout-btn').style.display = 'none';
  
  // 因為關閉編輯模式會影響表格輸入框渲染，需要重新整理表格並排序
  items.sort((a, b) => b.qty - a.qty);
  window.renderTable();
  showToast("已切換回唯讀模式");
};

// ============================================================
// Missing UI helper functions (Fixed cutoff issue)
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => {
    t.classList.remove('show');
  }, 3000);
}

function showSyncBadge() {
  const badge = document.getElementById('sync-badge');
  badge.style.display = 'inline-block';
  clearTimeout(window._badgeTimer);
  window._badgeTimer = setTimeout(() => {
    badge.style.display = 'none';
  }, 2000);
}

</script>
